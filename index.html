<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zona de Foco</title>
    <link rel="stylesheet" href="style.css" />
    <!-- Font Awesome for icons -->
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>

<body>
    <header class="app-header">
        <h1>Zona de Foco</h1>
        <button id="add-habit-btn" class="add-habit-btn">+ Novo Hábito</button>
        <button id="undo-btn" class="add-habit-btn" style="background:#ff4d4d;">⎌ Desfazer</button>
    </header>

    <main id="habit-list" class="habit-list">
        <!-- Habit cards will be injected here -->
    </main>

    <!-- Modal: Add Habit -->
    <div id="habit-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <div class="modal-header">
                <h2>Criar Hábito</h2>
                <button class="close-modal" id="close-habit-modal">&times;</button>
            </div>
            <div class="form-group">
                <label for="habit-name-input">Nome</label>
                <input type="text" id="habit-name-input" placeholder="Ex.: Flexões" />
            </div>
            <div class="form-group">
                <label for="habit-unit-input">Unidade</label>
                <input type="text" id="habit-unit-input" placeholder="ex.: rep, min, ml" />
            </div>
            <div class="form-group">
                <label for="habit-quick-values">Botões rápidos (separados por vírgula)</label>
                <input type="text" id="habit-quick-values" placeholder="5,10,20" />
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancel-habit">Cancelar</button>
                <button class="btn btn-primary" id="save-habit">Salvar</button>
            </div>
        </div>
    </div>

    <!-- Modal: Add Entry -->
    <div id="entry-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <div class="modal-header">
                <h2 id="entry-modal-title">Adicionar Entrada</h2>
                <button class="close-modal" id="close-entry-modal">&times;</button>
            </div>
            <div class="form-group">
                <label for="entry-value-input">Valor</label>
                <input type="number" id="entry-value-input" min="1" placeholder="Ex.: 15" />
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancel-entry">Cancelar</button>
                <button class="btn btn-primary" id="confirm-entry">Confirmar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
