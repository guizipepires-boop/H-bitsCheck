<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Um rastreador de hábitos simples e elegante para ajudar você a manter suas metas.">
    <title>Hábit check</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%2310b981' d='M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z'/></svg>">
</head>

<body>
    <div class="app-wrapper">
        <header class="app-header">
            <div class="logo-area">
                <div class="logo-icon">
                    <i class="fa-solid fa-chart-line"></i>
                </div>
                <h1>Hábit check</h1>
            </div>

            <div class="header-controls">
                <div class="week-navigation">
                    <button class="nav-btn" id="prev-week" aria-label="Semana anterior">
                        <i class="fa-solid fa-chevron-left"></i>
                    </button>
                    <div class="week-display" id="week-display">
                        <span class="week-label">Semana atual</span>
                        <span class="week-dates" id="week-dates">...</span>
                    </div>
                    <button class="nav-btn" id="next-week" aria-label="Próxima semana">
                        <i class="fa-solid fa-chevron-right"></i>
                    </button>
                </div>

                <button class="add-habit-btn" id="add-habit-btn">
                    <i class="fa-solid fa-plus"></i>
                    <span>Novo Hábito</span>
                </button>
            </div>
        </header>

        <main class="tracker-container">
            <div class="table-wrapper">
                <table class="habits-table">
                    <thead>
                        <tr>
                            <th class="habit-col-header">Meus Hábitos</th>
                            <th>Seg</th>
                            <th>Ter</th>
                            <th>Qua</th>
                            <th>Qui</th>
                            <th>Sex</th>
                            <th>Sáb</th>
                            <th>Dom</th>
                        </tr>
                    </thead>
                    <tbody id="habits-body">
                        <!-- Habits will be injected here -->
                    </tbody>
                </table>
            </div>

            <div id="empty-state" class="empty-state hidden">
                <div class="empty-img">🌱</div>
                <h3>Comece sua jornada</h3>
                <p>Adicione seu primeiro hábito para começar a rastrear seu progresso.</p>
                <button class="btn-primary" onclick="addNewHabit()">Criar Hábito</button>
            </div>
        </main>

        <footer class="app-footer">
            <p>Continue consistente. Um dia de cada vez.</p>
        </footer>
    </div>

    <!-- Modal for New Habit -->
    <div class="modal-overlay" id="habit-modal">
        <div class="modal-card">
            <div class="modal-header">
                <h3>Novo Hábito</h3>
                <button class="close-modal" id="close-modal"><i class="fa-solid fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="habit-name-input">Nome do Hábito</label>
                    <input type="text" id="habit-name-input" placeholder="Ex: Ler 10 páginas, Beber água...">
                </div>
                <div class="suggestions">
                    <span>Sugestões:</span>
                    <button class="chip" onclick="setHabitName('Leitura')">📚 Leitura</button>
                    <button class="chip" onclick="setHabitName('Entrenar')">💪 Treino</button>
                    <button class="chip" onclick="setHabitName('Meditar')">🧘 Meditação</button>
                    <button class="chip" onclick="setHabitName('Água')">💧 Água</button>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="cancel-habit">Cancelar</button>
                <button class="btn-primary" id="save-habit">Salvar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
